<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bhavith V.</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <div class="logo">BV.</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-section">
        <div class="container">
            <h1 class="section-title fade-in">Get In Touch</h1>
            
            <div class="contact-container fade-in">
                <div class="contact-info">
                    <h2>Let's build something.</h2>
                    <p>Whether you have a question or just want to say hi, my inbox is always open.</p>

                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <span>bhavithv5689@gmail.com</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <span>+91 9972446405</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Mangaluru, Karnataka, India</span>
                    </div>
                </div>

                <div class="contact-form-wrapper">
                    <form id="contactForm" action="https://formspree.io/f/xjgakeyo" method="POST">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Bhavith V. Engineered for performance.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
